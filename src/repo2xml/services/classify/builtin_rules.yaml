# Built-in classification rules bundled with repo2xml.

# Extensions that are always considered text (fast-path)
text_extensions:
  - .py
  - .js
  - .ts
  - .jsx
  - .tsx
  - .txt
  - .md
  - .rst
  - .yaml
  - .yml
  - .json
  - .xml
  - .csv
  - .toml
  - .cfg
  - .ini
  - .html
  - .htm
  - .css
  - .scss
  - .less
  - .java
  - .c
  - .cpp
  - .cc
  - .cxx
  - .h
  - .hpp
  - .rs
  - .go
  - .sh
  - .bash
  - .zsh
  - .bat
  - .ps1
  - .log
  - .env
  - .gitignore
  - .dockerignore
  - .editorconfig

# Extensions that are always considered binary (fast-path)
binary_extensions:
  - .png
  - .jpg
  - .jxl
  - .jpeg
  - .gif
  - .bmp
  - .ico
  - .webp
  - .tiff
  - .tif
  - .mp3
  - .wav
  - .flac
  - .ogg
  - .m4a
  - .mp4
  - .mkv
  - .avi
  - .mov
  - .webm
  - .zip
  - .gz
  - .bz2
  - .xz
  - .7z
  - .rar
  - .pdf
  - .ttf
  - .otf
  - .woff
  - .woff2
  - .exe
  - .dll
  - .so
  - .dylib
  - .pyc
  - .pyo
  - .class
  - .bin
  - .dat

# Compound suffixes (require two parts, e.g. .tar.gz)
compound_binary_suffixes:
  - .tar.gz
  - .tar.bz2
  - .tar.xz

# Ratio of non-text bytes above which a file is considered binary
binary_threshold: 0.30